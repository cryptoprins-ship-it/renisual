name: Smoke test

on:
  push:
    branches: [main]
  schedule:
    # 06:00 Europe/Amsterdam ≈ 04:00 UTC year-round (close enough for smoke)
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke-test renisual.com
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke test
        env:
          TEST_URL: https://renisual.com
        run: npm test

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report
          path: public/test-results
          retention-days: 14

      - name: Email report on failure
        if: failure()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          secure: true
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASS }}
          subject: "[Renisual] smoke-test FAILED (${{ github.event_name }})"
          to: info@renisual.com
          from: "Renisual CI <${{ secrets.SMTP_USER }}>"
          body: |
            Smoke-test failed (${{ github.event_name }}).
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}
            Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            Download the "smoke-report" artifact for details.
          attachments: public/test-results/report.html
